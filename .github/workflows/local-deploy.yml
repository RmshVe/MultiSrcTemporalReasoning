name: Local Build and Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show working directory
        run: |
          pwd
          ls -la

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build
        run: mvn clean package

      - name: Show target contents
        run: ls -la target

      - name: Stop old app
        run: pkill -f multisrc-temporal-reasoning || true

      - name: Start app
        run: |
          mkdir -p runtime
          JAR=$(ls target/*.jar | head -n 1)
          echo "Starting $JAR"
          nohup java -jar $JAR > runtime/app.log 2>&1 &
          sleep 15

      - name: Print logs
        run: |
          echo "===== APP LOG ====="
          cat runtime/app.log || true

      - name: Verify app is running
        run: |
          echo "===== PORT CHECK ====="
          lsof -i :8080 || (echo "App not running!" && exit 1)
